name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - '*.slnx'
              - '*.props'
              - '*.targets'
              - 'global.json'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - '.github/workflows/ci.yml'

  build-and-publish:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore CopilotBridge.slnx

      - name: Build (Debug)
        run: dotnet build CopilotBridge.slnx -c Debug --no-restore

      # Run a Release AOT publish too — catches IL trim / source-gen
      # regressions that don't surface under Debug. The playground project
      # tests hit live Copilot and require a DPAPI-encrypted GitHub OAuth
      # token, so they aren't run in CI; the goal here is "did it compile
      # under AOT" not behavioural coverage.
      - name: Publish AOT (verify trim/AOT clean)
        run: |
          dotnet publish src/CopilotBridge.Cli/CopilotBridge.Cli.csproj `
            -c Release -r win-x64 `
            -o ./publish-ci

      - name: Report binary size
        shell: pwsh
        run: |
          $exe = Get-Item ./publish-ci/copilot-bridge.exe
          $sizeMB = [math]::Round($exe.Length / 1MB, 2)
          Write-Host "copilot-bridge.exe = $sizeMB MB ($($exe.Length) bytes)"
          Write-Output "BINARY_SIZE_MB=$sizeMB" >> $env:GITHUB_OUTPUT
        id: size

      - name: Job summary
        shell: pwsh
        run: |
          @"
          ## Build summary

          | Configuration | Result |
          | --- | --- |
          | Debug build | ✅ |
          | Release AOT publish | ✅ |
          | \`copilot-bridge.exe\` size | **${{ steps.size.outputs.BINARY_SIZE_MB }} MB** |

          Tests skipped: \`CopilotBridge.Playground\` is an integration harness
          that requires a live GitHub OAuth token + DPAPI (Windows). Run
          locally with \`dotnet test\` after \`auth login\`.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
