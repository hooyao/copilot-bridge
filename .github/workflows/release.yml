name: Release

on:
  push:
    tags: ['release-*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. release-0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Resolve the version once, share it with every build arm + the release job.
  # ---------------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      prerelease: ${{ steps.version.outputs.PRERELEASE }}
    steps:
      - name: Parse version from tag
        id: version
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.tag }}"
          } else {
            "${{ github.ref_name }}"
          }
          $version = $tag -replace '^release-', ''
          Write-Output "VERSION=$version" >> $env:GITHUB_OUTPUT
          if ($version -match '-') {
            Write-Output "PRERELEASE=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Output "PRERELEASE=false" >> $env:GITHUB_OUTPUT
          }
          Write-Host "Version: $version, Prerelease: $($version -match '-')"

  # ---------------------------------------------------------------------------
  # 2. Build the AOT binary per RID on its own runner. Native AOT cannot
  #    cross-OS compile, so linux builds on ubuntu, osx on macos-14, windows
  #    on windows runners (win-arm64 natively on windows-11-arm). Each arm
  #    packages its own archive (.zip for Windows, .tar.gz for unix so the
  #    executable bit survives) and uploads it as an artifact.
  # ---------------------------------------------------------------------------
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-14
            rid: osx-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # A bare `dotnet publish` drives the AOT native link on every hosted image
      # (MSVC on Windows incl. native ARM64; clang+binutils on ubuntu; Xcode CLT
      # on macos-14). The local build-aot.bat / vswhere dance is only needed on
      # dev machines where vswhere isn't on PATH — CI images expose the toolchain
      # to the SDK's AOT targets directly.
      - name: Publish AOT (${{ matrix.rid }})
        shell: pwsh
        run: |
          dotnet publish src/CopilotBridge.Cli/CopilotBridge.Cli.csproj `
            -c Release -r ${{ matrix.rid }} `
            "-p:Version=${{ needs.version.outputs.version }}" `
            -o ./publish-aot
          # The updater ships in every auto-update archive so a running bridge can
          # replace itself (a Windows exe cannot overwrite itself in place). Same
          # RID, same Native AOT output directory.
          dotnet publish src/CopilotBridge.Updater/CopilotBridge.Updater.csproj `
            -c Release -r ${{ matrix.rid }} `
            "-p:Version=${{ needs.version.outputs.version }}" `
            -o ./publish-aot

      # Smoke the freshly-built binary before packaging: proves it loads on the
      # real OS and (on unix) that machine-id-derived encryption round-trips with
      # 0600 perms. Non-destructive — never touches a real token.
      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          chmod +x ./publish-aot/copilot-bridge ./publish-aot/copilot-updater
          ./publish-aot/copilot-bridge --version
          ./publish-aot/copilot-bridge debug selftest-tokenstore
          # The updater with no plan argument must fail fast (exit 10), proving the
          # Native AOT binary loads and its entry shell runs.
          set +e; ./publish-aot/copilot-updater; code=$?; set -e
          test "$code" = "10" || { echo "updater smoke expected exit 10, got $code"; exit 1; }

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./publish-aot/copilot-bridge.exe --version
          ./publish-aot/copilot-bridge.exe debug selftest-tokenstore
          ./publish-aot/copilot-updater.exe
          if ($LASTEXITCODE -ne 10) { throw "updater smoke expected exit 10, got $LASTEXITCODE" }

      # --- Package: Windows → .zip ------------------------------------------
      # All three files are required at runtime: appsettings.json carries the
      # Routing/Server/Tracing config the bridge loads with AddJsonFile(optional:false),
      # and copilot-updater is needed for the startup self-update flow.
      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $rid = "${{ matrix.rid }}"
          $exe = Get-Item ./publish-aot/copilot-bridge.exe
          $sizeMB = [math]::Round($exe.Length / 1MB, 2)
          Write-Host "Packaging copilot-bridge.exe ($sizeMB MB) + copilot-updater.exe + appsettings.json into copilot-bridge-$version-$rid.zip"
          Compress-Archive `
            -Path ./publish-aot/copilot-bridge.exe, ./publish-aot/copilot-updater.exe, ./publish-aot/appsettings.json `
            -DestinationPath "copilot-bridge-$version-$rid.zip" `
            -CompressionLevel Optimal

      # --- Package: unix → .tar.gz (preserves the +x bit; zip does not) ------
      - name: Package (unix tar.gz)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          rid="${{ matrix.rid }}"
          chmod +x ./publish-aot/copilot-bridge ./publish-aot/copilot-updater
          tar -czf "copilot-bridge-$version-$rid.tar.gz" \
            -C ./publish-aot copilot-bridge copilot-updater appsettings.json
          ls -la "copilot-bridge-$version-$rid.tar.gz"

      # --- macOS only: also build an unsigned .pkg installer ----------------
      # Installs the binaries + appsettings.json together into
      # /usr/local/copilot-bridge and symlinks the bridge onto PATH at
      # /usr/local/bin/copilot-bridge. They must stay co-located because the
      # bridge resolves appsettings.json from AppContext.BaseDirectory (the real
      # binary dir, symlinks resolved) — not the CWD. The updater is installed too
      # so package installs share the same future archive-update capability, but
      # auto-update always consumes the .tar.gz, never the .pkg.
      - name: Package (macOS .pkg)
        if: matrix.rid == 'osx-arm64'
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          root="pkgroot"
          mkdir -p "$root/usr/local/copilot-bridge" "$root/usr/local/bin"
          cp ./publish-aot/copilot-bridge "$root/usr/local/copilot-bridge/copilot-bridge"
          cp ./publish-aot/copilot-updater "$root/usr/local/copilot-bridge/copilot-updater"
          cp ./publish-aot/appsettings.json "$root/usr/local/copilot-bridge/appsettings.json"
          chmod +x "$root/usr/local/copilot-bridge/copilot-bridge" "$root/usr/local/copilot-bridge/copilot-updater"
          ln -s ../copilot-bridge/copilot-bridge "$root/usr/local/bin/copilot-bridge"
          pkgbuild --identifier com.hooyao.copilot-bridge \
            --version "$version" \
            --root "$root" \
            --install-location / \
            "copilot-bridge-$version-osx-arm64.pkg"
          ls -la "copilot-bridge-$version-osx-arm64.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.rid }}
          path: |
            copilot-bridge-*.zip
            copilot-bridge-*.tar.gz
            copilot-bridge-*.pkg
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3. Collect every arm's archive and publish ONE GitHub Release with all of
  #    them attached.
  # ---------------------------------------------------------------------------
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          # This job has no checkout (it only downloads artifacts), so `gh` can't
          # infer the repo from a local .git. Point it at the repo explicitly.
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          prerelease="${{ needs.version.outputs.prerelease }}"
          # Pin the notes base explicitly. Without --notes-start-tag, GitHub's
          # auto-detection of the "previous tag" fails in this repo — every release
          # commit carries TWO tags (the release-* trigger tag and the v* release
          # tag), which confuses it — so --generate-notes lists the ENTIRE history
          # instead of the delta since the last release. This release doesn't exist
          # yet, so the most recent EXISTING release is the previous one.
          #
          # Which "previous" depends on what we're cutting:
          #   - prerelease  → the most recent release of ANY kind (stable or beta),
          #     so a beta's notes cover just the commits since the last release.
          #   - stable      → the most recent STABLE release, SKIPPING the betas in
          #     between. Otherwise a stable cut whose commit matches the last beta
          #     would diff against that beta and produce EMPTY notes — the stable
          #     release must instead summarize everything accumulated across the
          #     betas since the previous stable.
          # `release view` is not used (it only surfaces the latest non-prerelease
          # and can't express the prerelease case). Empty on the very first release
          # of that kind → omit the flag, where full history is correct.
          if [ "$prerelease" = "true" ]; then
            prev_tag=$(gh release list --exclude-drafts -L 1 --json tagName --jq '.[0].tagName // ""')
          else
            prev_tag=$(gh release list --exclude-drafts --exclude-pre-releases -L 1 --json tagName --jq '.[0].tagName // ""')
          fi
          echo "Generating notes since previous release: ${prev_tag:-<none>}"
          # Create the release as a DRAFT: it is not public and not consumable by
          # the auto-updater until the anonymous digest verification below passes
          # and promotes it. A failed verification deletes the draft, so a broken
          # release is never left published.
          args=(release create "v$version"
            --draft
            --title "copilot-bridge $version"
            --generate-notes)
          if [ -n "$prev_tag" ]; then
            args+=(--notes-start-tag "$prev_tag")
          fi
          if [ "$prerelease" = "true" ]; then
            args+=(--prerelease)
          fi
          # Attach every built archive/installer.
          for f in dist/*; do
            args+=("$f")
          done
          gh "${args[@]}"

      # Prove the runtime's assumption BEFORE the release is public: every
      # auto-update archive must be visible with uploaded state, a positive size,
      # an HTTPS download URL, and a usable sha256: digest. Draft assets are read
      # with the authenticated gh here (anonymous users can't see a draft); the
      # PURE-anonymous check runs again after publish, below. If verification
      # fails, the draft is deleted so no incomplete release is ever published.
      - name: Verify + publish (draft gate)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"

          check_ok() {
            # $1 = JSON assets array from `gh release view --json assets`
            local body="$1"
            local pending count
            pending=$(jq -r '[.assets[]
              | select(.name | test("copilot-bridge-.*\\.(zip|tar\\.gz)$"))
              | select((.size <= 0)
                       or ((.apiUrl // .url // "") == "")
                       or (.digest == null)
                       or (.digest | startswith("sha256:") | not))
              ] | length' <<<"$body" 2>/dev/null || echo 99)
            count=$(jq -r '[.assets[]
              | select(.name | test("copilot-bridge-.*\\.(zip|tar\\.gz)$"))] | length' \
              <<<"$body" 2>/dev/null || echo 0)
            [ "$pending" = "0" ] && [ "$count" -ge 4 ]
          }

          ok=""
          for attempt in 1 2 3 4 5 6; do
            body=$(gh release view "v$version" --json assets 2>/dev/null || echo '{"assets":[]}')
            if check_ok "$body"; then
              echo "Draft: all update archives expose a sha256: digest."
              jq -r '.assets[] | select(.name|test("\\.(zip|tar\\.gz)$"))
                | "  \(.name)  \(.size)  \(.digest)"' <<<"$body"
              ok=1
              break
            fi
            echo "attempt $attempt: draft assets not yet complete; retrying…"
            sleep 10
          done

          if [ -z "$ok" ]; then
            echo "error: draft update archives lack usable sha256: digests — deleting draft" >&2
            gh release delete "v$version" --yes --cleanup-tag || true
            exit 1
          fi

          # Verification passed → publish the draft.
          gh release edit "v$version" --draft=false
          echo "Published v$version."

      # Belt-and-suspenders: re-check ANONYMOUSLY (no Authorization header — the
      # exact way the installed bridge sees it) now that the release is public.
      # If this fails, the release is already public, so delete it (authenticated
      # cleanup) before exiting non-zero — a broken release is never left up, and
      # the same tag can be cleanly retried.
      - name: Verify anonymous asset digests (post-publish)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          api="https://api.github.com/repos/${GH_REPO}/releases/tags/v${version}"
          for attempt in 1 2 3 4 5 6; do
            # NO Authorization header — anonymous, like the runtime.
            body=$(curl -fsSL -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" "$api" || true)
            pending=$(jq -r '[.assets[]
              | select(.name | test("copilot-bridge-.*\\.(zip|tar\\.gz)$"))
              | select(.state != "uploaded"
                       or (.size <= 0)
                       or (.browser_download_url | startswith("https://") | not)
                       or (.digest == null)
                       or (.digest | startswith("sha256:") | not))
              ] | length' <<<"${body:-{}}" 2>/dev/null || echo 99)
            count=$(jq -r '[.assets[]
              | select(.name | test("copilot-bridge-.*\\.(zip|tar\\.gz)$"))] | length' \
              <<<"${body:-{}}" 2>/dev/null || echo 0)
            if [ "$pending" = "0" ] && [ "$count" -ge 4 ]; then
              echo "All $count update archives expose an anonymous sha256: digest."
              jq -r '.assets[] | select(.name|test("\\.(zip|tar\\.gz)$"))
                | "  \(.name)  \(.size)  \(.digest)"' <<<"$body"
              exit 0
            fi
            echo "attempt $attempt: $pending archive(s) not yet uploaded/usable (of $count); retrying…"
            sleep 10
          done
          echo "error: published release lacks usable anonymous sha256: digests — deleting it" >&2
          gh release delete "v$version" --yes --cleanup-tag || true
          exit 1
